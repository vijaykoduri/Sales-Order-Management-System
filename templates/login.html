<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SalesERP Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #2C3E50;
            --accent: #00A09D;
            --bg-grad: linear-gradient(135deg, #2C3E50 0%, #1A252F 100%);
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-grad);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            transition: all 0.3s ease;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-logo i {
            font-size: 3rem;
            color: var(--accent);
        }
        .brand-logo h2 {
            font-weight: 800;
            color: var(--primary);
            margin-top: 10px;
            letter-spacing: 0.5px;
        }
        .brand-logo h2 span {
            color: var(--accent);
        }
        .form-control {
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #E2E8F0;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 160, 157, 0.15);
        }
        .btn-submit {
            background-color: var(--accent);
            color: white;
            padding: 12px;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background-color: #008f8c;
        }
        .form-switch-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .form-switch-link:hover {
            text-decoration: underline;
        }
        
        /* Admin Mode Styling Overrides */
        .login-card.admin-mode {
            border-top: 6px solid #E74C3C;
            background: rgba(30, 30, 47, 0.95);
            color: #E2E8F0;
            box-shadow: 0 15px 35px rgba(231, 76, 60, 0.15);
        }
        .login-card.admin-mode .brand-logo i {
            color: #E74C3C;
        }
        .login-card.admin-mode .brand-logo h2 {
            color: #FFFFFF;
        }
        .login-card.admin-mode .brand-logo h2 span {
            color: #E74C3C;
        }
        .login-card.admin-mode .brand-logo p {
            color: #94A3B8 !important;
        }
        .login-card.admin-mode .form-label {
            color: #E2E8F0;
        }
        .login-card.admin-mode .input-group-text {
            background-color: #2b2b3d;
            border-color: #4A5568;
            color: #A0AEC0;
        }
        .login-card.admin-mode .form-control {
            background-color: #1A1A2E;
            border-color: #4A5568;
            color: #FFFFFF;
        }
        .login-card.admin-mode .form-control:focus {
            border-color: #E74C3C;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.25);
        }
        .login-card.admin-mode .btn-submit {
            background-color: #E74C3C;
        }
        .login-card.admin-mode .btn-submit:hover {
            background-color: #C0392B;
        }
    </style>
</head>
<body>
    
    <div class="login-card" id="login-card-container">
        <!-- Portal Selection Tabs -->
        <div class="d-flex justify-content-center mb-4 border-bottom pb-2" id="portal-tabs">
            <button type="button" class="btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-dark border-bottom border-2 border-primary me-2" id="tab-sales-portal">
                <i class="bi bi-rocket-takeoff-fill me-1"></i>Sales Portal
            </button>
            <button type="button" class="btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-muted" id="tab-admin-portal">
                <i class="bi bi-shield-lock-fill me-1"></i>Admin Console
            </button>
        </div>

        <!-- Logo -->
        <div class="brand-logo">
            <i class="bi bi-rocket-takeoff-fill" id="brand-logo-icon"></i>
            <h2>Sales<span>ERP</span></h2>
            <p class="text-muted" id="form-subtitle">Login to access your ERP portal</p>
        </div>
        
        <!-- Error Alert Callout -->
        <div class="alert alert-danger d-none" id="error-alert" role="alert">
            Error message goes here
        </div>
        <!-- Success Alert Callout -->
        <div class="alert alert-success d-none" id="success-alert" role="alert">
            Success message goes here
        </div>
        
        <!-- Login Form Section -->
        <form id="login-form">
            <div class="mb-3">
                <label for="login-username" class="form-label">Username or Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="login-username" placeholder="Enter username or email" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="login-password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="login-password" placeholder="Enter password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-submit mb-3">Sign In</button>
            <p class="text-center mb-0 text-muted" id="register-link-wrap">
                Don't have an account? <a href="#" class="form-switch-link" id="show-register-btn">Register here</a>
            </p>
            <p class="text-center mb-0 text-danger fw-bold d-none" id="admin-warning-wrap">
                <i class="bi bi-exclamation-octagon me-1"></i> Authorized Admin Personnel Only
            </p>
        </form>
        
        <!-- Register Form Section -->
        <form id="register-form" class="d-none">
            <div class="mb-3">
                <label for="reg-username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" id="reg-username" placeholder="Choose a username" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="reg-email" class="form-label">Email Address</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="email" class="form-control" id="reg-email" placeholder="Enter email address" required>
                </div>
            </div>
            <div class="mb-3">
                <label for="reg-role" class="form-label">System Role</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                    <select class="form-select form-control" id="reg-role" required>
                        <option value="Employee">Employee (Sales Representative)</option>
                        <option value="Sales Manager">Sales Manager</option>
                        <option value="Admin">Administrator</option>
                    </select>
                </div>
                <div class="form-text text-muted">First user is automatically assigned Admin rights.</div>
            </div>
            <div class="mb-4">
                <label for="reg-password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="reg-password" placeholder="Choose a strong password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-submit mb-3">Sign Up</button>
            <p class="text-center mb-0 text-muted">
                Already have an account? <a href="#" class="form-switch-link" id="show-login-btn">Login here</a>
            </p>
        </form>
    </div>
    
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = '/dashboard';
        }
        
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const showRegisterBtn = document.getElementById('show-register-btn');
        const showLoginBtn = document.getElementById('show-login-btn');
        const formSubtitle = document.getElementById('form-subtitle');
        
        const errorAlert = document.getElementById('error-alert');
        const successAlert = document.getElementById('success-alert');
        
        function showAlert(alertEl, msg) {
            alertEl.textContent = msg;
            alertEl.classList.remove('d-none');
            setTimeout(() => alertEl.classList.add('d-none'), 8000);
        }
        
        // Portal Selection Tab Event Handlers
        const tabSalesPortal = document.getElementById('tab-sales-portal');
        const tabAdminPortal = document.getElementById('tab-admin-portal');
        const loginCard = document.getElementById('login-card-container');
        const registerLinkWrap = document.getElementById('register-link-wrap');
        const adminWarningWrap = document.getElementById('admin-warning-wrap');
        
        tabSalesPortal.addEventListener('click', () => {
            loginCard.classList.remove('admin-mode');
            tabSalesPortal.className = 'btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-dark border-bottom border-2 border-primary me-2';
            tabAdminPortal.className = 'btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-muted';
            formSubtitle.textContent = 'Login to access your Sales ERP portal';
            document.getElementById('brand-logo-icon').className = 'bi bi-rocket-takeoff-fill';
            
            if (registerLinkWrap) registerLinkWrap.classList.remove('d-none');
            if (adminWarningWrap) adminWarningWrap.classList.add('d-none');
            
            registerForm.classList.add('d-none');
            loginForm.classList.remove('d-none');
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
        });
        
        tabAdminPortal.addEventListener('click', () => {
            loginCard.classList.add('admin-mode');
            tabAdminPortal.className = 'btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-white border-bottom border-2 border-danger me-2';
            tabSalesPortal.className = 'btn btn-sm btn-link text-decoration-none fw-bold px-3 py-1 text-muted';
            formSubtitle.textContent = 'System Administration Console';
            document.getElementById('brand-logo-icon').className = 'bi bi-shield-lock-fill';
            
            if (registerLinkWrap) registerLinkWrap.classList.add('d-none');
            if (adminWarningWrap) adminWarningWrap.classList.remove('d-none');
            
            registerForm.classList.add('d-none');
            loginForm.classList.remove('d-none');
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
        });

        // Form views toggling
        showRegisterBtn.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.add('d-none');
            registerForm.classList.remove('d-none');
            formSubtitle.textContent = 'Create your corporate ERP account';
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
        });
        
        showLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.add('d-none');
            loginForm.classList.remove('d-none');
            formSubtitle.textContent = 'Login to access your ERP portal';
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
        });
        
        // Handle Login Submission
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    // Check console role restriction
                    const isAdminPortal = loginCard.classList.contains('admin-mode');
                    if (isAdminPortal && data.user.role !== 'Admin') {
                        showAlert(errorAlert, 'Access Denied: You do not have Administrator console privileges.');
                        return;
                    }
                    
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    showAlert(errorAlert, data.message || 'Login failed');
                }
            } catch (err) {
                showAlert(errorAlert, 'Network connection failed. Make sure server is running.');
            }
        });
        
        // Handle Registration Submission
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');
            
            const username = document.getElementById('reg-username').value;
            const email = document.getElementById('reg-email').value;
            const role = document.getElementById('reg-role').value;
            const password = document.getElementById('reg-password').value;
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, role, password })
                });
                
                const data = await response.json();
                if (response.ok) {
                    showAlert(successAlert, 'Registration successful! You can now log in.');
                    // Toggle view
                    registerForm.classList.add('d-none');
                    loginForm.classList.remove('d-none');
                    formSubtitle.textContent = 'Login to access your ERP portal';
                    document.getElementById('login-username').value = username;
                } else {
                    showAlert(errorAlert, data.message || 'Registration failed');
                }
            } catch (err) {
                showAlert(errorAlert, 'Network connection failed. Make sure server is running.');
            }
        });
    </script>
</body>
</html>
