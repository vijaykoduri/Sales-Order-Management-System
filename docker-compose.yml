version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: erp_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_password
      POSTGRES_DB: sales_order_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    container_name: erp_web_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres_secure_password@db:5432/sales_order_db
      - SECRET_KEY=94bc8da07c92b23a9d949cf9bde486ef
      - JWT_SECRET_KEY=a7d25eefc40df112f4618e9a26325bf3
      - FLASK_ENV=production
      - PORT=5000
    depends_on:
      - db

volumes:
  postgres_data:
